display.browser=true

dist.dir=dist
dist.javadoc.dir=${dist.dir}/javadoc
dist.war=${dist.dir}/Ai-investment-management.war

endorsed.classpath=
excludes=
includes=**

j2ee.compile.on.save=true
j2ee.copy.static.files.on.save=true

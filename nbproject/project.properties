    ${build.classes.dir}
run.jvmargs=
run.test.classpath=\
    ${javac.test.classpath}:\
    ${build.test.classes.dir}

source.encoding=UTF-8
source.root=src
src.dir=${source.root}/java
test.src.dir=${source.root}/test

war.ear.name=Ai-investment-management

# NetBeans Project Properties — InvestmentMS
# ================================================

annotation.processing.enabled=true
annotation.processing.enabled.in.editor=false
annotation.processing.processors.list=
annotation.processing.run.all.processors=true
annotation.processing.source.output=${build.generated.sources.dir}/ap-source-output

build.classes.dir=${build.dir}/classes
build.classes.excludes=**/*.java,**/*.form
build.dir=build
build.generated.dir=${build.dir}/generated
build.generated.sources.dir=${build.dir}/generated-sources
build.web.dir=${build.dir}/web
build.web.excludes=$build.classes.excludes
conf.dir=${source.root}/conf
debug.classpath=${run.classpath}
debug.test.classpath=${run.test.classpath}
dist.dir=dist
dist.jar=${dist.dir}/InvestmentMS.war
dist.javadoc.dir=${dist.dir}/javadoc

endorsed.classpath=
excludes=
includes=**

j2ee.compile.on.save=true
j2ee.copy.static.files.on.save=true
j2ee.deploy.on.save=true
j2ee.platform=jakartaee10-web
j2ee.platform.classpath=
j2ee.platform.embeddableejb.classpath=
j2ee.server.instance=

jar.compress=false
javac.classpath=\
    ${file.reference.mysql-connector-j.jar}:\
    ${file.reference.jakarta.servlet-api.jar}

# MySQL Connector — place in project libs/ folder
file.reference.mysql-connector-j.jar=libs/mysql-connector-j-9.0.0.jar

# Jakarta Servlet API — provided by Tomcat
file.reference.jakarta.servlet-api.jar=libs/jakarta.servlet-api-6.0.0.jar

javac.compilerargs=
javac.deprecation=false
javac.processorpath=${javac.classpath}
javac.source=17
javac.target=17
javac.test.classpath=${javac.classpath}
javac.test.processorpath=${javac.test.classpath}

jaxbwiz.endorsed.dirs="${netbeans.home}/../ide/modules/ext/jaxb/api"

lib.dir=${web.docbase.dir}/WEB-INF/lib
meta.inf.dir=${source.root}/conf

no.dependencies=false

persistence.xml.dir=${conf.dir}

platform.active=default_platform

run.classpath=\
    ${javac.classpath}:\
    ${build.classes.dir}

run.jvmargs=
run.test.classpath=\
    ${javac.test.classpath}:\
    ${build.test.classes.dir}

source.encoding=UTF-8
source.root=src
src.dir=${source.root}/java
test.src.dir=${source.root}/test

war.content.additional=
war.ear.name=InvestmentMS
war.name=InvestmentMS
war.package.on.build=false

web.docbase.dir=web
webinf.dir=${web.docbase.dir}/WEB-INF
